name: Build RSS (SciTech)

on:
  push:
    paths:
      - 'scrape_scitech.py'
      - '.github/workflows/build_scitech.yml'
  workflow_dispatch:
  schedule:
    - cron: '5 */6 * * *'   # every 6h, offset 5 minutes to avoid overlap

concurrency:
  group: rss-feed-updates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt
      - run: python -m playwright install --with-deps chromium

      - run: python scrape_scitech.py

      - name: Commit feed_scitech.xml
        shell: bash
        run: |
          set -e
          test -f feed_scitech.xml
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

          # Commit local change, then retry rebase/push if another feed lands first.
          git add feed_scitech.xml
          git commit -m "Update SciTech feed" || echo "No changes"
          for attempt in 1 2 3; do
            git fetch origin ${{ github.ref_name }}
            git pull --rebase --autostash origin ${{ github.ref_name }}
            if git push origin HEAD:${{ github.ref_name }}; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after $attempt attempts"
              exit 1
            fi
            echo "Push failed; retrying after rebase (attempt $attempt)"
            sleep 5
          done
